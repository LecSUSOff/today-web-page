<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page-title">Today | Reinventing Your Journaling Experience</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #1a1a1a; letter-spacing: -0.01em; overflow-x: hidden; }
        .hero-title { letter-spacing: -0.05em; line-height: 0.85; }
        .btn-indigo { background-color: #3F51B5; transition: all 0.2s ease; }
        .btn-indigo:hover { background-color: #303F9F; transform: translateY(-1px); }
        .mission-badge { border: 1px solid #3F51B5; color: #3F51B5; }
        
        /* Spotlight Effect */
        #spotlight {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
            background: radial-gradient(circle 200px at var(--x) var(--y), rgba(63, 81, 181, 0.04), transparent 100%);
        }

        /* Reveal Animation */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        .lang-switch { cursor: pointer; font-size: 0.75rem; font-weight: 800; opacity: 0.3; transition: all 0.2s; }
        .lang-switch.active { opacity: 1; color: #3F51B5; }

        /* Swiper Fixes */
        .swiper { width: 100%; padding-bottom: 60px; }
        .swiper-slide { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        .app-mockup { width: 100%; height: auto; border-radius: 20px; }
    </style>
</head>
<body class="antialiased">
    <div id="spotlight" class="hidden md:block"></div>

    <!-- Mobile Sticky Bar -->
    <div id="mobile-bar" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 p-4 flex items-center justify-between z-[100] md:hidden translate-y-full transition-transform duration-500">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="w-6 h-6">
            <span class="font-bold text-sm tracking-tight">Today</span>
        </div>
        <a href="app-release.apk" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg shadow-indigo-200">Download APK</a>
    </div>

    <nav class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Today Logo" class="w-7 h-7">
            <span class="font-bold text-lg tracking-tight">Today</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex gap-2 items-center bg-gray-100 px-3 py-1.5 rounded-full mr-2">
                <button onclick="setLanguage('en')" id="lang-en" class="lang-switch">EN</button>
                <button onclick="setLanguage('ru')" id="lang-ru" class="lang-switch">RU</button>
            </div>
            <a href="privacy.html" data-i18n="nav-privacy" class="text-sm font-medium text-neutral-400 hover:text-black">Privacy</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
        <section class="reveal pt-12">
            <div class="mb-10">
                <span data-i18n="mission-badge" class="mission-badge px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">Mission</span>
                <p id="mission-text" class="mt-4 text-indigo-600 font-bold text-lg md:text-2xl tracking-tight italic leading-tight"></p>
            </div>
            <h1 id="hero-title-main" class="hero-title text-7xl md:text-9xl font-black mb-10"></h1>
            <p id="hero-subtitle" class="text-xl md:text-2xl text-neutral-500 font-medium leading-tight mb-12 max-w-2xl"></p>
            <a href="app-release.apk" data-i18n="get-apk" class="btn-indigo text-white px-10 py-5 rounded-2xl font-bold text-lg shadow-xl inline-block">Get the APK</a>
        </section>

        <section class="mt-20 overflow-hidden reveal">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="pictures/today_tab.png" class="app-mockup"></div>
                    <div class="swiper-slide"><img src="pictures/dark_mode_today_tab.png" class="app-mockup"></div>
                    <div class="swiper-slide"><img src="pictures/calendar_tab.png" class="app-mockup"></div>
                    <div class="swiper-slide"><img src="pictures/history_tab.png" class="app-mockup"></div>
                </div>
            </div>
        </section>

        <section class="py-32 grid md:grid-cols-2 gap-16 reveal border-t border-gray-100">
            <div class="space-y-16">
                <div class="border-l-4 border-indigo-600 pl-8">
                    <h3 data-i18n="feat-1-title" class="text-2xl font-bold mb-3 tracking-tight"></h3>
                    <p data-i18n="feat-1-desc" class="text-neutral-500 leading-relaxed text-lg"></p>
                </div>
                <div class="border-l-4 border-neutral-200 pl-8">
                    <h3 data-i18n="feat-2-title" class="text-2xl font-bold mb-3 tracking-tight"></h3>
                    <p data-i18n="feat-2-desc" class="text-neutral-500 leading-relaxed text-lg"></p>
                </div>
            </div>
            <div class="space-y-16">
                <div class="border-l-4 border-neutral-200 pl-8">
                    <h3 data-i18n="feat-3-title" class="text-2xl font-bold mb-3 tracking-tight"></h3>
                    <p data-i18n="feat-3-desc" class="text-neutral-500 leading-relaxed text-lg"></p>
                </div>
                <div class="border-l-4 border-neutral-200 pl-8">
                    <h3 data-i18n="feat-4-title" class="text-2xl font-bold mb-3 tracking-tight"></h3>
                    <p data-i18n="feat-4-desc" class="text-neutral-500 leading-relaxed text-lg"></p>
                </div>
            </div>
        </section>

        <section class="py-24 border-t border-neutral-100 reveal">
            <div class="max-w-2xl">
                <p id="founder-quote" class="text-3xl font-semibold italic text-neutral-800 leading-snug"></p>
                <div class="mt-10 flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white shadow-lg text-lg">L</div>
                    <div>
                        <p class="font-bold text-sm">lecsusoff</p>
                        <p data-i18n="founder-title" class="text-xs text-neutral-400 font-medium"></p>
                    </div>
                </div>
            </div>
        </section>

        <footer class="py-20 border-t border-neutral-100 flex justify-between items-center text-[10px] font-black text-neutral-300 uppercase tracking-[0.2em]">
            <span data-i18n="footer-copy">© 2026 Today Journal</span>
            <a href="app-release.apk" class="text-indigo-600 underline">Get APK</a>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const translations = {
            en: {
                "page-title": "Today | Reinventing Your Journaling Experience",
                "nav-privacy": "Privacy",
                "mission-badge": "Mission",
                "mission-text": '"Today, <span class="text-black">today</span> will reinvent your journaling experience."',
                "hero-title": 'Your life is worth <br><span style="color: #3F51B5;">repeating.</span>',
                "hero-subtitle": 'Most journals store memories just to bury them. <span class="text-black font-semibold">Today</span> is built to resurface your past at the exact moment you need to see it.',
                "get-apk": "Get the APK",
                "feat-1-title": "Anniversary Loop",
                "feat-1-desc": "Recurrence is built in. Memories resurface automatically on the same date every year.",
                "feat-2-title": "The Clean Slate",
                "feat-2-desc": "Wipe your daily board every night so your mind starts fresh every day.",
                "feat-3-title": "TodayID Identity",
                "feat-3-desc": "Encryption by default. Sign in on any phone and your history follows you instantly.",
                "feat-4-title": "Independent Soft",
                "feat-4-desc": "No data mining, no noise. Independent software built for people who value their time. Built by lecsusoff.",
                "founder-quote": '"I built Today because I was tired of burying my wins in static notes. Seeing your growth recur changes your day."',
                "founder-title": "Alexey Zukovsky, Founder",
                "footer-copy": "© 2026 Today Journal • Flutter + Supabase"
            },
            ru: {
                "page-title": "Today | Переосмысление личного дневника",
                "nav-privacy": "Приватность",
                "mission-badge": "Миссия",
                "mission-text": '«Сегодня <span class="text-black">today</span> полностью изменит ваш подход к ведению дневника».',
                "hero-title": 'Ваша жизнь стоит того, <br><span style="color: #3F51B5;">чтобы её помнить.</span>',
                "hero-subtitle": 'Записи в дневниках постоянно теряются. <span class="text-black font-semibold">Today</span> выносит ваше прошлое на поверхность именно тогда, когда оно вам нужно.',
                "get-apk": "Скачать APK",
                "feat-1-title": "Петля Юбилеев",
                "feat-1-desc": "Память запрограммирована вернуться на ту же дату каждый год. История сама находит вас.",
                "feat-2-title": "Чистый лист",
                "feat-2-desc": "Стирай цели каждый вечер одной кнопкой. Утро начинается с чистого экрана.",
                "feat-3-title": "Личность TodayID",
                "feat-3-desc": "Мы шифруем данные на каждом этапе. Войди на любом устройстве, и вся твоя история вернется мгновенно.",
                "feat-4-title": "Никакого мусора",
                "feat-4-desc": "Никакой рекламы и слежки. Это софт для тех, кто ценит свое время. Сделано lecsusoff.",
                "founder-quote": '«Я создал Today, потому что устал хоронить свои победы в обычных заметках. Повторение успехов меняет продуктивность сегодня».',
                "founder-title": "Алексей Жуковский, Основатель",
                "footer-copy": "© 2026 Today Journal • Flutter + Supabase"
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('preferred-lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.getElementById('mission-text').innerHTML = translations[lang]["mission-text"];
            document.getElementById('hero-title-main').innerHTML = translations[lang]["hero-title"];
            document.getElementById('hero-subtitle').innerHTML = translations[lang]["hero-subtitle"];
            document.getElementById('founder-quote').innerHTML = translations[lang]["founder-quote"];
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
        }

        const savedLang = localStorage.getItem('preferred-lang') || (navigator.language.startsWith('ru') ? 'ru' : 'en');
        setLanguage(savedLang);

        // Spotlight
        window.addEventListener('mousemove', e => {
            document.body.style.setProperty('--x', e.clientX + 'px');
            document.body.style.setProperty('--y', e.clientY + 'px');
        });

        // Mobile Bar Reveal
        window.addEventListener('scroll', () => {
            const bar = document.getElementById('mobile-bar');
            if (window.scrollY > 400) bar.classList.remove('translate-y-full');
            else bar.classList.add('translate-y-full');
        });

        // Reveal Observer
        const obs = new IntersectionObserver(ents => {
            ents.forEach(e => { if (ents[0].isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

        new Swiper(".mySwiper", { centeredSlides: true, slidesPerView: "auto", spaceBetween: 40, loop: true, grabCursor: true, autoplay: { delay: 4000 } });
    </script>
</body>
</html>
